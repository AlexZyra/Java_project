<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Movies List</title>
</head>
<body>
<div th:fragment="content">
    <h1>Movies</h1>

    <div class="row mb-3">
        <div class="col-md-6">
            <form method="get" action="/movies" class="d-flex">
                <input type="text" name="search" class="form-control me-2" placeholder="Search movies...">
                <button type="submit" class="btn btn-primary">Search</button>
            </form>
        </div>
        <div class="col-md-6 text-end">
            <a href="/movies/create" class="btn btn-success">Add New Movie</a>
        </div>
    </div>

    <div class="row">
        <div th:each="movie : ${movies}" class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title" th:text="${movie.title}">Movie Title</h5>
                    <p class="card-text">
                        Year: <span th:text="${movie.year}"></span><br>
                        Genre: <span th:text="${movie.genre != null ? movie.genre.name : 'No Genre'}"></span><br>
                        Reviews: <span th:text="${movie.reviews.size()}"></span>
                    </p>
                    <a th:href="@{/movies/{id}(id=${movie.id})}" class="btn btn-primary">View Details</a>
                    <a th:href="@{/movies/edit/{id}(id=${movie.id})}" class="btn btn-warning">Edit</a>
                    <a th:href="@{/movies/delete/{id}(id=${movie.id})}" class="btn btn-danger"
                       onclick="return confirm('Are you sure?')">Delete</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
