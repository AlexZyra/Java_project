<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Movie</title>
</head>
<body>
<div th:fragment="content">
    <h1>Create New Movie</h1>

    <form th:action="@{/movies/create}" th:object="${movie}" method="post">
        <div class="mb-3">
            <label for="title" class="form-label">Title:</label>
            <input type="text" th:field="*{title}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="year" class="form-label">Year:</label>
            <input type="number" th:field="*{year}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="genre.id" class="form-label">Genre:</label>
            <select th:field="*{genre.id}" class="form-control">
                <option value="">Select Genre</option>
                <option th:each="genre : ${genres}" th:value="${genre.id}" th:text="${genre.name}"></option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Create Movie</button>
        <a href="/movies" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
